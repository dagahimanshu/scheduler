spring.application.name=scheduler
server.port=9090
spring.config.import=optional:classpath:application-local.properties,optional:file:./application-local.properties

huggingface.model=facebook/bart-large-mnli
huggingface.api-key=

google.oauth.callback-host=localhost
google.oauth.callback-port=8888
google.oauth.callback-path=/oauth2/callback
google.oauth.credentials-path=
google.oauth.tokens-directory=.oauth-tokens
google.calendar.time-zone=Asia/Kolkata

microsoft.oauth.client-id=
microsoft.oauth.client-secret=
microsoft.oauth.tenant-id=common
microsoft.oauth.redirect-uri=http://localhost:9090/auth/microsoft/callback
microsoft.oauth.tokens-directory=.oauth-tokens

spring.mail.host=
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
delegate.magic-link-base=http://localhost:3000/auth/delegate
delegate.link-expiry-hours=48
