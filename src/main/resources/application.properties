spring.application.name=scheduler
server.port=9090
app.frontend-url=http://localhost:3000
app.backend-url=http://localhost:9090
spring.config.import=optional:classpath:application-local.properties

huggingface.model=facebook/bart-large-mnli
huggingface.api-key=

google.oauth.client-id=
google.oauth.client-secret=
google.oauth.tokens-directory=.oauth-tokens
google.calendar.time-zone=Asia/Kolkata

microsoft.oauth.client-id=
microsoft.oauth.client-secret=
microsoft.oauth.tenant-id=common
microsoft.oauth.redirect-uri=http://localhost:9090/auth/microsoft/callback
microsoft.oauth.tokens-directory=.oauth-tokens

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
delegate.magic-link-base=http://localhost:3000/auth/delegate
delegate.link-expiry-hours=48

jwt.secret=
jwt.expiration-hours=24

spring.datasource.url=jdbc:sqlite:scheduler.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
