# ── Production Environment ──

# App URLs (injected from .env via docker-compose)
app.frontend-url=${APP_FRONTEND_URL}
app.backend-url=${APP_BACKEND_URL}
server.port=8080

# Google OAuth
google.oauth.client-id=${GOOGLE_CLIENT_ID}
google.oauth.client-secret=${GOOGLE_CLIENT_SECRET}
google.oauth.redirect-uri=${APP_BACKEND_URL}/auth/google/callback
google.oauth.tokens-directory=/var/data/scheduler/oauth-tokens

# Microsoft OAuth
microsoft.oauth.client-id=${AZURE_CLIENT_ID}
microsoft.oauth.client-secret=${AZURE_CLIENT_SECRET}
microsoft.oauth.tenant-id=common
microsoft.oauth.redirect-uri=${APP_BACKEND_URL}/auth/microsoft/callback
microsoft.oauth.tokens-directory=/var/data/scheduler/oauth-tokens

# Hugging Face
huggingface.api-key=${HF_API_KEY}

# SMTP (production Mailgun with verified domain)
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

# Delegate
delegate.magic-link-base=${APP_FRONTEND_URL}/auth/delegate
delegate.link-expiry-hours=48

# Calendar
google.calendar.time-zone=Asia/Kolkata

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration-hours=24

# SQLite (containerized path — persisted via Docker volume)
spring.datasource.url=jdbc:sqlite:/app/data/scheduler.db
